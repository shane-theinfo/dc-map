<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>How U.S. communities turned against data centers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  /* The Information house fonts (Suisse), served from ti-assets */
  @font-face{font-family:'Suisse Works';src:url('https://ti-assets.theinformation.com/assets/SuisseWorks-Regular-b4272f237eca2e6d617bb382940a1c974784e44a98043c153bf6e6198948021d.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap}
  @font-face{font-family:'Suisse Screen';src:url('https://ti-assets.theinformation.com/assets/SuisseScreen-Regular-72db97be84d92e41a28233e706820cc6e5daf2a21aaceb7b79c19cee84a77a21.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap}
  @font-face{font-family:'Suisse Intl Mono';src:url('https://ti-assets.theinformation.com/assets/SuisseIntlMono-Regular-177352b94a6187dbcce69fb8a64a16a1d27d5725b80f28453cb73ecbbb67548c.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap}
  :root{
    --ink:#1a1a1a; --muted:#333333; --faint:#888888; --hair:#e7e8ea;
    --land:#eceef0; --land-line:#ffffff; --nation:#c7cace;
    --in:#F32A52; --prop:#eeb540; --exp:#9aa1a8; --fail:#d2d7dd;
    --bg:#ffffff; --readout:#1a1a1a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg)}
  body{font-family:'Suisse Screen','Source Sans 3',-apple-system,Arial,sans-serif;-webkit-font-smoothing:antialiased;color:var(--ink)}

  /* the iframe-owned scroll area: a tall track with a pinned stage */
  #scroller{height:100vh;overflow-y:auto;overflow-x:hidden;position:relative;
    -webkit-overflow-scrolling:touch;scrollbar-width:thin}
  #track{position:relative;height:680vh}            /* scroll distance past the pin — raise for slower/more resistance */
  #stage{position:sticky;top:0;height:100vh;width:100%;max-width:860px;margin:0 auto;
    display:flex;flex-direction:column;padding:12px 22px 10px;background:var(--bg)}

  /* progress bar pinned to the very top of the stage */
  #prog{position:absolute;left:0;top:0;height:3px;width:0;background:var(--in);
    transition:width .05s linear;z-index:8}

  /* player-mode control bar (play/pause + scrubber) — shown only in .player mode */
  #controls{display:none;align-items:center;gap:10px;height:26px;margin:0 0 9px}
  #playpause{flex:0 0 auto;width:26px;height:26px;border:0;border-radius:50%;background:var(--in);
    color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
  #playpause svg{width:13px;height:13px;fill:#fff;display:block}
  #scrub{position:relative;flex:1 1 auto;height:6px;border-radius:3px;background:var(--hair);cursor:pointer;touch-action:none}
  #scrubfill{position:absolute;left:0;top:0;height:100%;width:0;background:var(--in);border-radius:3px;pointer-events:none}

  .header-row{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin:0 0 3px}
  h1{font-family:'Suisse Works','Source Serif 4',Georgia,serif;font-weight:700;font-size:28px;line-height:1.1;
    letter-spacing:-.4px;margin:0;color:var(--ink)}
  .logo{height:24px;width:auto;flex:0 0 auto;margin-top:3px}
  .sub{font-family:'Suisse Screen','Source Sans 3',Arial,sans-serif;font-size:18px;line-height:1.4;color:var(--muted);
    margin:0 0 5px;max-width:720px}

  /* readout: the running date + counts (label sits inline next to the number) */
  .readout{display:flex;align-items:baseline;justify-content:space-between;gap:16px;
    border-top:1px solid var(--hair);padding:6px 0 2px;margin:0;flex-wrap:wrap}
  #date{font-family:'Suisse Works','Source Serif 4',Georgia,serif;font-weight:700;font-size:26px;line-height:1;
    color:var(--readout);letter-spacing:-.4px;font-variant-numeric:tabular-nums}
  .tally{text-align:right;line-height:1.05}
  #count{font-weight:600;font-size:26px;color:var(--in);font-variant-numeric:tabular-nums}
  .tally .clab{font-size:13px;color:var(--faint);font-weight:600;margin-left:5px}

  /* map */
  #mapbox{position:relative;flex:1 1 auto;min-height:150px;margin:2px 0 0}
  svg.map{display:block;width:100%;height:100%}
  .state{fill:var(--land);stroke:var(--land-line);stroke-width:.8;vector-effect:non-scaling-stroke}
  .wash,.region{vector-effect:non-scaling-stroke}
  .region{stroke:#fff;stroke-width:.6}
  .pt circle{stroke:#fff;vector-effect:non-scaling-stroke}

  /* scroll cue + replay overlays */
  .overlay{position:absolute;left:50%;transform:translateX(-50%);z-index:10}
  #cue{bottom:8px;font-size:12.5px;color:var(--faint);background:var(--bg);
    padding:5px 12px;border-radius:20px;border:1px solid var(--hair);
    box-shadow:0 2px 10px rgba(20,24,30,.06);transition:opacity .3s;white-space:nowrap}
  #cue .ar{display:inline-block;animation:bob 1.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
  #replay{top:50%;transform:translate(-50%,-50%);display:none;align-items:center;gap:8px;
    font-family:'Suisse Screen','Source Sans 3',sans-serif;font-size:14px;font-weight:600;color:#fff;
    background:var(--in);border:0;border-radius:24px;padding:10px 20px;cursor:pointer;
    box-shadow:0 6px 20px rgba(243,42,82,.35)}
  #replay:hover{filter:brightness(.95)}
  #replay svg{width:15px;height:15px;fill:#fff}

  /* bar chart */
  #barwrap{flex:0 0 auto;margin:2px 0 2px}
  .bar-head{display:flex;justify-content:space-between;align-items:baseline;margin:0 0 3px}
  .bar-title{font-size:13px;font-weight:600;color:var(--faint)}
  .bar-now{font-size:13px;color:var(--muted);font-weight:600}
  svg#bars{display:block;width:100%;height:98px}
  #bars .axis text{font-size:13px;fill:var(--faint)}
  #bars .gl{stroke:var(--hair);stroke-width:1}

  /* legend (sits above the map) + footnote — Status row, then Level row */
  .legend{display:flex;flex-direction:column;gap:4px;margin:6px 0 6px}
  .lg-row{display:flex;align-items:center;flex-wrap:wrap;gap:5px 13px}
  .lg-lab{font-size:9px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.4px}
  .key{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:#3b3f45;line-height:1}
  .key .sw{width:11px;height:11px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 1px #fff inset}
  .key.shape svg{display:block}
  .foot{font-family:'Suisse Intl Mono','Source Sans 3',monospace;font-size:14px;line-height:1.4;color:var(--faint);padding-top:6px;text-align:right}
  .foot b{color:#555;font-weight:600}

  /* mobile */
  @media (max-width:560px){
    #stage{padding:11px 13px 10px}
    h1{font-size:22px;letter-spacing:-.2px}
    .logo{height:17px}
    .sub{font-size:15px;margin-bottom:6px}
    #date{font-size:20px}
    #count{font-size:20px}
    .tally .clab{font-size:11.5px;margin-left:4px}
    #mapbox{min-height:130px}
    svg#bars{height:82px}
    .key{font-size:11px}
    .foot{text-align:left;font-size:12.5px}
  }

  /* dark theme */
  body.dark{--bg:#2F3538;--ink:#fff;--muted:#fff;--faint:#aeb4b8;--hair:#474e52;
    --land:#fff;--land-line:#2F3538;--nation:#2F3538;--readout:#fff}
  body.dark .state{stroke-width:.4}
  body.dark .foot b{color:#fff}
  body.dark .key{color:#e7ebed}
  body.dark .bar-now{color:#e7ebed}
  body.dark #cue{background:#3a4145;border-color:#535b60;color:#cfd5d8}
</style>
</head>

ille", "st": "PA", "place": "Brookville, Pa.", "status": "", "spop": "Temporary ban", "bucket": "temp", "cat": "", "start": "June 2026", "end": "", "sd": 739782, "ed": null, "dur": "6 months", "brief": "", "kind": "local", "lon": -79.07947, "lat": 41.16043}, {"ref": "NEW-050", "juris": "Adams Township", "st": "PA", "place": "Adams Township, Pa.", "status": "", "spop": "Temporary ban", "bucket": "temp", "cat": "", "start": "June 2026", "end": "", "sd": 739782, "ed": null, "dur": "6 months", "brief": "", "kind": "local", "lon": -78.74679, "lat": 40.30255}, {"ref": "NEW-051", "juris": "Gallatin", "st": "TN", "place": "Gallatin, Tenn.", "status": "", "spop": "Temporary ban", "bucket": "temp", "cat": "", "start": "June 2026", "end": "", "sd": 739782, "ed": null, "dur": "2 years", "brief": "", "kind": "local", "lon": -86.44759, "lat": 36.3883}], "counts": {"total": 426, "inforce": 318, "states": 46, "local": 261, "county": 147, "state": 18, "tribal": 0, "federal": 2, "dated": 381}, "timeline": {"min": 738566, "max": 739965}};

// ---------- palette ----------
// permanent + temporary merged into one "Active ban" red; expired = grey
const COL={perm:'#F32A52',temp:'#F32A52',prop:'#eeb540',exp:'#9aa1a8',rej:'#d2d7dd'};
const STK={perm:'#c22242',temp:'#c22242',prop:'#ba8d32',exp:'#7d848b',rej:'#b3bac2'};
const ACC=new Set(['perm','temp']);   // only enacted bans accumulate (proposed set isn't exhaustive -> excluded)
const FADE=80;                                // ordinal-day window for expired/rejected to fade out
const W=806, HMAP=500;
// fixed window: histogram + clock run Jan 2024 -> June 2026 (records outside clamp to the edges)
const dateToOrd=(y,m,d)=>Math.round(Date.UTC(y,m-1,d)/864e5)+719163;
const T0=dateToOrd(2025,1,1), T1=dateToOrd(2026,6,24), TSPAN=Math.max(1,T1-T0);   // ends at the publish date
const PLAYER = document.body.classList.contains('player') || new URLSearchParams(location.search).has('player');
const clampSD=sd=>sd==null?null:Math.max(T0,Math.min(T1,sd));
const mq=window.matchMedia('(max-width:560px)');
const isMobile=()=>mq.matches;

// ---------- ordinal-day <-> calendar ----------
const MON=['Jan.','Feb.','March','April','May','June','July','Aug.','Sept.','Oct.','Nov.','Dec.'];  // AP style (March–July spelled out)
function ordToDate(o){ const d=new Date((o-719163)*86400000); return {y:d.getUTCFullYear(), m:d.getUTCMonth()+1}; }
function fmtDate(o){ const d=ordToDate(o), e=ordToDate(T1);
  if(d.y===e.y&&d.m===e.m){ const pd=new Date((T1-719163)*86400000); return MON[e.m-1]+' '+pd.getUTCDate()+', '+e.y; }  // publish month -> show the day
  return MON[d.m-1]+' '+d.y; }
function monthKey(o){ const d=ordToDate(o); return d.y*12+(d.m-1); }

// ---------- projection + base map ----------
const svg=d3.select('#map').attr('viewBox',`0 0 ${W} ${HMAP}`);
const proj=d3.geoAlbers().rotate([96,0]).center([-0.6,38.7]).parallels([29.5,45.5]).fitSize([W,HMAP],DB.states);
const path=d3.geoPath(proj);
const stFeat={}; DB.states.features.forEach(f=>stFeat[f.properties.abbr]=f);

// hatch patterns for state-level fills (one per status colour)
const defs=svg.append('defs');
const HOP={perm:.66,temp:.6,prop:.58,exp:.42,rej:.34};
Object.keys(COL).forEach(k=>{
  const pat=defs.append('pattern').attr('id','h-'+k).attr('width',6).attr('height',6)
    .attr('patternUnits','userSpaceOnUse').attr('patternTransform','rotate(45)');
  pat.append('line').attr('x1',0).attr('y1',0).attr('x2',0).attr('y2',6)
    .attr('stroke',COL[k]).attr('stroke-width',1.4).attr('stroke-opacity',HOP[k]);
});

const root=svg.append('g');
const gState=root.append('g'), gWash=root.append('g'), gReg=root.append('g'), gPt=root.append('g');
gState.selectAll('path').data(DB.states.features).join('path').attr('class','state').attr('d',path);

function markerR(){ const w=svg.node().getBoundingClientRect().width||W; return Math.max(3.0, 3.2*W/w); }

// ---------- build all features once (hidden), then drive opacity by time ----------
// (purely a time-lapse — no tooltips/click here by design)
const washes=DB.points.filter(p=>p.kind==='state'&&stFeat[p.st]);
const wSel=gWash.selectAll('path').data(washes,p=>p.st).join('path')
  .attr('class','wash').attr('d',p=>path(stFeat[p.st]))
  .attr('fill',p=>`url(#h-${p.bucket})`).attr('stroke',p=>STK[p.bucket]).attr('stroke-width',1).attr('opacity',0);

const rSel=gReg.selectAll('path').data(DB.regions.features,f=>f.properties.fips||f.properties.juris).join('path')
  .attr('class','region').attr('d',path)
  .attr('fill',f=>COL[f.properties.bucket])
  .attr('stroke',f=>STK[f.properties.bucket]).attr('stroke-opacity',.5).attr('opacity',0);

const locals=DB.points.filter(p=>p.kind==='local');
const order={rej:0,exp:1,prop:2,temp:3,perm:4};
locals.sort((a,b)=>order[a.bucket]-order[b.bucket]);
let R=markerR();
const gSel=gPt.selectAll('g.pt').data(locals).join('g').attr('class','pt')
  .attr('transform',p=>{const xy=proj([p.lon,p.lat])||[-99,-99]; return `translate(${xy[0]},${xy[1]})`;})
  .attr('opacity',0);
gSel.append('circle').attr('r',R).attr('fill',p=>COL[p.bucket]).attr('stroke-width',.9);
function resizeMarkers(){ R=markerR(); gSel.select('circle').attr('r',R); }

// opacity for a record at time t
function alphaAt(o,t){
  if(o.sd==null) return ((o.bucket==='perm'||o.bucket==='temp') && t>=T1) ? 1 : 0;  // undated active -> appear at the very end
  if(o.bucket==='exp'&&o.ed!=null&&o.ed<T0) return 0;       // expired before the window opens
  const sd=clampSD(o.sd); if(t<sd) return 0;
  const b=o.bucket;
  if(b==='perm'||b==='temp') return 1;                      // active bans accumulate & persist
  if(b!=='exp') return 0;                                   // proposed AND rejected not shown
  const ed=clampSD(o.ed);                                   // expired: visible until it lapses, then fades
  const anchor=(ed!=null)?ed:sd;
  if(t<anchor) return 1;
  const f=1-(t-anchor)/FADE; return f>0?f*f:0;              // ease-out fade
}

// timeline is scaled by calendar time — an even clock — NOT by how many bans have passed
function tAtProgress(p){ return T0 + p*TSPAN; }

// ---------- bar chart (new accumulating restrictions per month) ----------
const barsSvg=d3.select('#bars');
const kMin=monthKey(T0), kMax=monthKey(T1);
const slots=[]; for(let k=kMin;k<=kMax;k++) slots.push({k,y:Math.floor(k/12),m:k%12,en:0});
function addToSlot(o){ if(o.sd==null||!ACC.has(o.bucket)) return; const i=monthKey(o.sd)-kMin;
  if(i<0||i>=slots.length) return; slots[i].en++; }
DB.points.forEach(p=>{ if(p.kind==='local'||p.kind==='state') addToSlot(p); });
DB.regions.features.forEach(f=>addToSlot(f.properties));
const maxBar=Math.max(1,d3.max(slots,s=>s.en));
let barRects=[], yearTicks=[], BW=0, BH=58, GAP=1.4, bx0=0;
function layoutBars(){
  const w=barsSvg.node().getBoundingClientRect().width||600;
  BH=isMobile()?54:74; const axisH=20; const totalH=BH+axisH;
  barsSvg.attr('viewBox',`0 0 ${w} ${totalH}`);
  barsSvg.selectAll('*').remove();
  BW=(w-(slots.length-1)*GAP)/slots.length; bx0=0;
  const yScale=v=>BH*(v/maxBar);
  const g=barsSvg.append('g');
  barRects=slots.map((s,i)=>{
    const x=i*(BW+GAP), hen=yScale(s.en);
    const en=g.append('rect').attr('x',x).attr('width',Math.max(.6,BW)).attr('y',BH-hen).attr('height',hen).attr('fill',COL.temp);
    return {en,k:s.k,x};
  });
  // year ticks at January slots
  const ax=barsSvg.append('g').attr('class','axis');
  slots.forEach((s,i)=>{ if(s.m===0){ const x=i*(BW+GAP);
    ax.append('line').attr('class','gl').attr('x1',x).attr('x2',x).attr('y1',0).attr('y2',BH);
    ax.append('text').attr('x',x+2).attr('y',BH+15).text(s.y); } });
}

// ---------- the single render entry point ----------
function setProgress(prog){
  const t=tAtProgress(prog);
  // map
  wSel.attr('opacity',d=>alphaAt(d,t));
  rSel.attr('opacity',d=>alphaAt(d.properties,t));
  gSel.attr('opacity',d=>alphaAt(d,t));
  // tally (enacted bans only)
  let en=0;
  const tally=o=>{ if(o.bucket!=='perm'&&o.bucket!=='temp')return;
    if(o.sd==null){ if(t>=T1) en++; return; }                 // undated active -> added to the final tally
    if(t>=clampSD(o.sd)) en++; };
  DB.points.forEach(p=>{ if(p.kind==='local'||p.kind==='state') tally(p); });
  DB.regions.features.forEach(f=>tally(f.properties));
  document.getElementById('date').textContent=fmtDate(t);
  document.getElementById('count').textContent=en.toLocaleString();
  // bars: fill slots up to the current month
  const curK=monthKey(t);
  barRects.forEach(b=>{ b.en.attr('opacity', b.k<=curK?1:.16); });
  document.getElementById('barnow').textContent=fmtDate(t);
  // chrome
  document.getElementById('prog').style.width=(prog*100)+'%';
  if(PLAYER) document.getElementById('scrubfill').style.width=(prog*100)+'%';
  const cue=document.getElementById('cue'); cue.style.opacity=prog>0.01?0:1;
  document.getElementById('replay').style.display=(!PLAYER && prog>0.995)?'flex':'none';
}

// ---------- scroll driving ----------
const scroller=document.getElementById('scroller');
let externallyDriven=false;
function readProgress(){ const max=scroller.scrollHeight-scroller.clientHeight;
  return max>0?Math.min(1,Math.max(0,scroller.scrollTop/max)):0; }
scroller.addEventListener('scroll',()=>{ if(!externallyDriven) setProgress(readProgress()); },{passive:true});

// optional parent-driven mode: a host page posts {type:'dcScrollProgress', p:0..1} to drive
// the timeline from its own scroll (true scrollytelling). Falls back to inner scroll otherwise.
window.addEventListener('message',e=>{
  const d=e.data; if(!d) return;
  if(d.type==='dcPlay'){ if(PLAYER) pPlay(); return; }     // host scrolled the box into view
  if(d.type==='dcPause'){ if(PLAYER) pPause(); return; }
  if(d.type==='dcScrollProgress' && typeof d.p==='number'){
    if(PLAYER) return;                                      // player ignores scroll-driving
    if(!externallyDriven){ externallyDriven=true; scroller.style.overflowY='hidden'; scroller.scrollTop=0; }
    setProgress(Math.max(0,Math.min(1,d.p)));
  }
});

// ---------- play / replay ----------
let raf=null;
function playFromStart(){
  cancelAnimationFrame(raf);
  const max=scroller.scrollHeight-scroller.clientHeight; const dur=15000; let t0=null;
  if(!externallyDriven) scroller.scrollTop=0;
  setProgress(0);
  function step(ts){ if(t0===null)t0=ts; const k=Math.min(1,(ts-t0)/dur);   // linear in time
    if(externallyDriven) setProgress(k); else scroller.scrollTop=k*max;
    if(k<1) raf=requestAnimationFrame(step); }
  raf=requestAnimationFrame(step);
}
document.getElementById('replay').addEventListener('click',playFromStart);

// autoplay mode (?autoplay) — for a plain fixed-height iframe embed: no pin, no inner scroll,
// no scroll-jacking. The graphic plays itself when it loads; the host page scrolls past normally.
if(new URLSearchParams(location.search).has('autoplay')){
  externallyDriven=true;                       // disable inner-scroll driving
  scroller.style.overflowY='hidden';
  scroller.scrollTop=0;
  document.getElementById('cue').style.display='none';   // no "scroll to begin" — it plays itself
  setProgress(0);
  setTimeout(playFromStart,600);               // small beat so the map is painted first
}

// ---------- player mode (?player / body.player): fixed box, top scrubber + play/pause,
// auto-starts when the host scrolls it into view (loader posts dcPlay). NOT a scrolly. ----------
const PLAY_SVG='<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
const PAUSE_SVG='<svg viewBox="0 0 24 24"><path d="M6 5h3.5v14H6zM14.5 5H18v14h-3.5z"/></svg>';
let pProg=0, pPlaying=false, pRaf=null, pT0=null, pBase=0, pStarted=false;
const PDUR=5000;                               // play-through duration (ms)
function pIcon(){ const b=document.getElementById('playpause'); if(!b)return;
  b.innerHTML=pPlaying?PAUSE_SVG:PLAY_SVG; b.setAttribute('aria-label',pPlaying?'Pause':'Play'); }
function pStep(ts){ if(pT0===null)pT0=ts; pProg=Math.min(1,pBase+(ts-pT0)/PDUR); setProgress(pProg);
  if(pProg<1){ pRaf=requestAnimationFrame(pStep); } else { pPlaying=false; pIcon(); } }
function pPlay(){ if(pPlaying)return; pStarted=true; if(pProg>=1)pProg=0; pPlaying=true; pBase=pProg; pT0=null; pIcon(); pRaf=requestAnimationFrame(pStep); }
function pPause(){ if(!pPlaying)return; pPlaying=false; cancelAnimationFrame(pRaf); pIcon(); }
function pToggle(){ pPlaying?pPause():pPlay(); }
function pSeek(x){ pProg=Math.max(0,Math.min(1,x)); pBase=pProg; pT0=null; setProgress(pProg); }
if(PLAYER){
  externallyDriven=true; scroller.style.overflowY='hidden'; scroller.scrollTop=0;
  document.getElementById('cue').style.display='none';
  document.getElementById('prog').style.display='none';
  document.getElementById('replay').style.display='none';
  document.getElementById('controls').style.display='flex';
  setProgress(0); pIcon();
  document.getElementById('playpause').addEventListener('click',pToggle);
  const scrub=document.getElementById('scrub');
  const scrubTo=ev=>{ const r=scrub.getBoundingClientRect(); pSeek((ev.clientX-r.left)/r.width); };
  scrub.addEventListener('pointerdown',ev=>{ scrub.setPointerCapture(ev.pointerId);
    const wasPlaying=pPlaying; if(wasPlaying)pPause(); scrubTo(ev);
    const mv=e2=>scrubTo(e2);
    const up=()=>{ scrub.removeEventListener('pointermove',mv); scrub.removeEventListener('pointerup',up); if(wasPlaying)pPlay(); };
    scrub.addEventListener('pointermove',mv); scrub.addEventListener('pointerup',up); });
}

// ---------- legend ----------
function shapeSVG(kind){
  if(kind==='local') return '<svg width="12" height="12"><circle cx="6" cy="6" r="4" fill="#9aa1a8" stroke="#fff"/></svg>';
  if(kind==='county') return '<svg width="14" height="11"><rect x="1" y="1" width="12" height="9" rx="2" fill="#cdd2d8"/></svg>';
  return '<svg width="14" height="11"><defs><pattern id="lhk" width="3.4" height="3.4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="3.4" stroke="#a7adb3" stroke-width="1"/></pattern></defs><rect x="1" y="1" width="12" height="9" rx="1.5" fill="url(#lhk)" stroke="#c4c9ce"/></svg>';
}
const lg=d3.select('#legend');
const sRow=lg.append('div').attr('class','lg-row');
sRow.append('span').attr('class','lg-lab').text('Status');
[['perm','Active ban'],['exp','Expired ban']]
  .forEach(([k,lab])=>{ const el=sRow.append('span').attr('class','key');
    el.append('span').attr('class','sw').style('background',COL[k]); el.append('span').text(lab); });

// ---------- footnote ----------
document.getElementById('foot').innerHTML=
  'Note: No entries in Hawaii or Alaska. • Map: Shane Burke • Source: The Information reporting, public records, local news sources';

// ---------- resize + init ----------
function relayout(){ resizeMarkers(); layoutBars(); setProgress(readProgress()); }
let rAF; window.addEventListener('resize',()=>{ cancelAnimationFrame(rAF); rAF=requestAnimationFrame(relayout); });
layoutBars(); setProgress(0);
</script>
